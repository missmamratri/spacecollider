<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Space Collider Score</title>
  <script>
    // ambil skor dari parameter URL
    function getScore() {
      const params = new URLSearchParams(window.location.search);
      return params.get("score");
    }
    window.onload = function() {
      const score = getScore();
      document.getElementById("scoreText").innerText =
        "I've got " + score + " points in Space Collider!";
    }
  </script>
</head>
<body style="background-color:black; color:white; text-align:center; font-family:sans-serif;">
  <h1 id="scoreText">Loading...</h1>
  <p style="margin-top:20px; font-size:18px;">
    Let's play 👉 <a href="https://missmamratri.github.io/spacecollider/" style="color:cyan;">Space Collider Game</a>
  </p>
</body>
</html>
